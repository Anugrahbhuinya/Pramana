# alembic.ini
[alembic]
script_location = migrations
prepend_sys_path = true
version_path_separator = os

# sqlalchemy.url is dynamically overridden in env.py using settings.DATABASE_URL
sqlalchemy.url = postgresql://pramana_admin:pramana_secure_pass_998@localhost:5432/pramana_db

[post_write_hooks]
# Run black formatter on newly created migration files
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = REVISION_SCRIPT_FILE

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
